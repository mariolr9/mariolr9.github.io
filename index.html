<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROG2526 · Tema 5 · Herencia e Interfaces</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161d;
    --card: #191c26;
    --border: #252836;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --correct: #00d4aa;
    --wrong: #ff4d6d;
    --text: #e8eaf0;
    --muted: #7a7f99;
    --code-bg: #0a0c11;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, #1a1d2e 0%, #0d0f14 60%);
    border-bottom: 1px solid var(--border);
    padding: 48px 40px 36px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(108,99,255,.18) 0%, transparent 70%);
    pointer-events: none;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -40px; left: 30%;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(0,212,170,.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 12px;
  }
  header h1 {
    font-size: clamp(24px, 4vw, 42px);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, #a8b4ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  header p {
    color: var(--muted);
    font-size: 14px;
  }

  /* Score bar */
  .scorebar {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    max-width: 900px;
    margin: 32px auto 0;
    padding: 0 40px;
  }
  .score-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 100px;
    flex: 1;
  }
  .score-chip span:first-child {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 600;
  }
  .score-chip span:last-child {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #score-correct { color: var(--correct); }
  #score-wrong   { color: var(--wrong); }
  #score-pct     { color: var(--accent); }

  /* Nav tabs */
  .tabs {
    display: flex;
    gap: 8px;
    max-width: 900px;
    margin: 32px auto 0;
    padding: 0 40px;
  }
  .tab {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    text-align: center;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .tab:hover:not(.active) {
    border-color: var(--accent);
    color: var(--text);
  }

  /* Section label */
  .section-label {
    max-width: 900px;
    margin: 32px auto 0;
    padding: 0 40px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .section-label .badge {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 20px;
    padding: 3px 10px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Quiz area */
  .quiz-wrap {
    max-width: 900px;
    margin: 20px auto 0;
    padding: 0 40px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Question card */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .q-card.answered { border-color: var(--border); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--border);
  }
  .q-num {
    background: var(--accent);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    border-radius: 8px;
    padding: 4px 10px;
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .q-text {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.5;
    color: var(--text);
  }

  /* Code block inside question */
  .code-block {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-top: 12px;
    overflow-x: auto;
    white-space: pre;
    color: #c9d1d9;
  }

  /* Options */
  .options {
    padding: 16px 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    transition: all .18s;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    user-select: none;
  }
  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: rgba(108,99,255,.08);
  }
  .option.disabled { cursor: default; }
  .option.selected-wrong {
    border-color: var(--wrong);
    background: rgba(255,77,109,.1);
    color: var(--wrong);
  }
  .option.correct-highlight {
    border-color: var(--correct);
    background: rgba(0,212,170,.12);
    color: var(--correct);
    font-weight: 600;
  }
  .option.selected-right {
    border-color: var(--correct);
    background: rgba(0,212,170,.12);
    color: var(--correct);
    font-weight: 600;
  }
  .opt-letter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    background: var(--border);
    border-radius: 6px;
    padding: 2px 7px;
    flex-shrink: 0;
    margin-top: 1px;
    transition: background .18s, color .18s;
  }
  .option.selected-wrong .opt-letter { background: var(--wrong); color: #fff; }
  .option.correct-highlight .opt-letter,
  .option.selected-right .opt-letter  { background: var(--correct); color: #0d0f14; }

  /* Feedback banner */
  .feedback {
    margin: 0 24px 20px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok {
    background: rgba(0,212,170,.1);
    border: 1px solid var(--correct);
    color: var(--correct);
  }
  .feedback.fail {
    background: rgba(255,77,109,.08);
    border: 1px solid var(--wrong);
    color: var(--wrong);
  }

  /* Progress */
  .progress-wrap {
    max-width: 900px;
    margin: 28px auto 0;
    padding: 0 40px;
  }
  .progress-bar-bg {
    background: var(--surface);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width .3s ease;
    width: 0%;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Reset button */
  .reset-wrap {
    max-width: 900px;
    margin: 32px auto 0;
    padding: 0 40px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .btn-reset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 10px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-reset:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  /* Hidden */
  .quiz-section { display: none; }
  .quiz-section.active { display: block; }

  @media (max-width: 600px) {
    header { padding: 32px 20px 24px; }
    .scorebar, .tabs, .section-label, .quiz-wrap, .progress-wrap, .reset-wrap { padding: 0 16px; }
    .q-header { flex-direction: column; gap: 8px; }
  }
</style>
</head>

const Q2 = [

// ─── STATE ──────────────────────────────────────────────────────────────────
let answered = new Set();
let correct  = 0;
let wrong    = 0;
const letters = ['a','b','c','d'];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Build shuffled options keeping track of correct index
function prepQuestion(q) {
  const indices = [0,1,2,3];
  const shuffled = shuffle(indices);
  const newCorrect = shuffled.indexOf(q.correct);
  return {
    ...q,
    shuffledOpts: shuffled.map(i => q.opts[i]),
    shuffledCorrect: newCorrect
  };
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function buildCard(q, globalIdx) {
  const div = document.createElement('div');
  div.className = 'q-card';
  div.id = `card-${globalIdx}`;

  const qText = q.q.replace(/\n/g, '<br>');
  const codeHtml = q.code
    ? `<div class="code-block">${escHtml(q.code)}</div>` : '';

  const optsHtml = q.shuffledOpts.map((opt, i) => {
    const optText = opt.replace(/\n/g,'<br>');
    return `<div class="option" id="opt-${globalIdx}-${i}" onclick="pick(${globalIdx},${i},${q.shuffledCorrect})">
      <span class="opt-letter">${letters[i]}</span>
      <span>${optText}</span>
    </div>`;
  }).join('');

  div.innerHTML = `
    <div class="q-header">
      <span class="q-num">Q${String(globalIdx+1).padStart(2,'0')}</span>
      <span class="q-text">${qText}${codeHtml}</span>
    </div>
    <div class="options">${optsHtml}</div>
    <div class="feedback" id="fb-${globalIdx}"></div>
  `;
  return div;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── INTERACTION ────────────────────────────────────────────────────────────
function pick(qIdx, chosen, correctIdx) {
  if (answered.has(qIdx)) return;
  answered.add(qIdx);

  const fb = document.getElementById(`fb-${qIdx}`);

  for (let i = 0; i < 4; i++) {
    const el = document.getElementById(`opt-${qIdx}-${i}`);
    if (!el) continue;
    el.classList.add('disabled');
  }

  const chosenEl  = document.getElementById(`opt-${qIdx}-${chosen}`);
  const correctEl = document.getElementById(`opt-${qIdx}-${correctIdx}`);

  if (chosen === correctIdx) {
    chosenEl.classList.add('selected-right');
    fb.className = 'feedback show ok';
    fb.textContent = '✓ ¡Correcto!';
    correct++;
  } else {
    chosenEl.classList.add('selected-wrong');
    correctEl.classList.add('correct-highlight');
    fb.className = 'feedback show fail';
    fb.textContent = `✗ Incorrecto · La correcta es la opción ${letters[correctIdx].toUpperCase()}.`;
    wrong++;
  }

  updateScore();
}

function updateScore() {
  const total = allPrepped.length;
  const done  = answered.size;
  document.getElementById('score-correct').textContent = correct;
  document.getElementById('score-wrong').textContent   = wrong;
  document.getElementById('score-remain').textContent  = total - done;
  document.getElementById('score-pct').textContent     = done > 0
    ? Math.round(correct / done * 100) + '%' : '0%';
  document.getElementById('prog-fill').style.width = (done/total*100) + '%';
  document.getElementById('prog-label').textContent = `${done} respondidas`;
}

// ─── SECTIONS ───────────────────────────────────────────────────────────────
function showSection(idx) {
  document.querySelectorAll('.quiz-section').forEach((s,i) => {
    s.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', i === idx);
  });
}

// ─── INIT ───────────────────────────────────────────────────────────────────
const q1Prepped = Q1.map(prepQuestion);
const q2Prepped = Q2.map(prepQuestion);

// Shuffle order of questions within each set
const q1Shuffled = shuffle(q1Prepped);
const q2Shuffled = shuffle(q2Prepped);
const allShuffled = shuffle([...q1Prepped, ...q2Prepped]);

// We need a single global index
const allPrepped = [];
const sectionMap = { 0: [], 1: [], 2: [] };

// Build global list maintaining per-section grouping
q1Shuffled.forEach(q  => { const idx = allPrepped.length; allPrepped.push(q); sectionMap[0].push(idx); sectionMap[2].push(idx); });
q2Shuffled.forEach(q  => { const idx = allPrepped.length; allPrepped.push(q); sectionMap[1].push(idx); sectionMap[2].push(idx); });

// Override section 2 with mixed shuffle
// Re-map: section 2 will show same cards but in mixed order
sectionMap[2] = shuffle([...sectionMap[0], ...sectionMap[1]]);

document.getElementById('prog-total').textContent = allPrepped.length + ' preguntas';
document.getElementById('score-remain').textContent = allPrepped.length;

[0,1,2].forEach(sec => {
  const wrap = document.getElementById(`wrap-${sec}`);
  sectionMap[sec].forEach((globalIdx, display) => {
    const q = allPrepped[globalIdx];
    const card = buildCard(q, globalIdx);
    // Override display number for section 2 (just cosmetic)
    if (sec === 2) {
      card.querySelector('.q-num').textContent = `Q${String(display+1).padStart(2,'0')}`;
    }
    wrap.appendChild(card);
  });
});
</script>
